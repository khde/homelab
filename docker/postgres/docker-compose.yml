
services:
  postgres:
    image: postgres:18.2
    container_name: postgresql
    restart: unless-stopped
    # ports:
    #   - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql
    networks:
      homelab-network:

networks:
  homelab-network:
    external: true
