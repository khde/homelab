
services:
  nginx-proxy:
    image: jc21/nginx-proxy-manager:2.14.0
    restart: unless-stopped 
    env_file:
      - ../../.env
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    environment:
      INITIAL_ADMIN_EMAIL: ${NPM_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${NPM_ADMIN_PASSWORD}
      DB_POSTGRES_HOST: ${POSTGRES_HOST}
      DB_POSTGRES_PORT: ${POSTGRES_PORT}
      DB_POSTGRES_NAME: ${NPM_DB_NAME}
      DB_POSTGRES_USER: ${NPM_DB_USER}
      DB_POSTGRES_PASSWORD: ${NPM_DB_PASSWORD}
      PUID: 1000
      PGID: 1000
    volumes:
      - ./npm-data:/data
      - ./npm-ssl-data:/etc/letsencrypt
    networks:
      - homelab-network

networks:
  homelab-network:
    external: true
